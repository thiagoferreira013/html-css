<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferente ou simplesmente aumente ou diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(min-width: 1000px)" srcset="imagens/foto-grande.png" type="image/png">
        <source media="(min-width: 700px)" srcset="imagens/foto-media.png" type="image/png">
        <img src="imagens/foto-pequena.png" alt="Foto flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio preload="metadata" controls>
        <source src="midia/guanacast.mp3" type="audio/mpeg">
        <source src="midia/guanacast.ogg" type="audio/ogg">
        <p>Não conseguiu acessar o áudio? Instale ele <a href="midia/guanacast.mp3" download="guanacast.mp3" type="audio/mpeg">clicando aqui</a></p>
    </audio>
</body>
</html>
