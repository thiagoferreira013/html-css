<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            text-align: center;
            margin-bottom: 2%;
        }

        fieldset{
            width: 30vw;
            margin: auto;
        }

        legend{
            font-size: 2em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulários</h1>
    <form action="cadastro.php" method="get" autocomplete="on"">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="iemail">E-Mail</label>
                <input type="email" name="iemail" id="iemail" autocomplete="email" required>
            </p>
            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="itel" id="itel" autocomplete="tel" required placeholder="(**)****-****">
            </p>
            <p>
                <input type="submit" value="Enviar">
            </p>
        </fieldset>
    </form>
</body>
</html>
