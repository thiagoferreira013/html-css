<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>

    <form action="cadastro.php" method="get">
        <p>
            <label for="inome">Nome: </label>
            <input type="text" name="inome" id="inome" maxlength="30" required placeholder="Nome completo">
        </p>
        <p>
            <label for="imedia">Média: 
                <input type="number" name="imedia" id="imedia" min="0" max="10" step="0.1" required value="5">
            </label>
        </p>
        <p>
            <label for="imes">Período Letivo</label>
            <input type="month" name="imes" id="imes">
        </p>
        <p>
            <label for="idata">Data</label>
            <input type="date" name="idata" id="idata">
        </p>
        <p>
            <label for="ihora">Hora</label>
            <input type="time" name="ihora" id="ihora">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
