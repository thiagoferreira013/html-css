<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        .conteiner{
            display: flex;
            background-color: lightsalmon;
            flex-flow: row nowrap;
        }

        .item{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px;
        }

        #cxA{
            /*
            flex-grow: 0;
            flex-shrink: 1;
            flex-basis: 200px;
            */

            flex: 0 1 200px;
        }

        #cxB{
            /*
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 200px;   
            */

            flex: 1 1 200px;
        }

        #cxC{
            /*
            flex-grow: 1;
            flex-shrink: 8;
            flex-basis: auto;
            */

            flex: 1 8 auto;
        }

    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>
</body>
</html>
