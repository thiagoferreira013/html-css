<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 400px;
            border-collapse: collapse;
        }

        .cabecalho{
            border: 1px solid black;
            background-color: gray;
            padding: 10px;
            color: white;
        }

        td{
            border: 1px solid black;
            padding: 7px;
        }

        th{
            border: 1px solid black;
            padding: 5px;
        }

        .notas{
            text-align: center;
        }

        #titulo{
            border: 1px solid black;
            background-color: gray;
            padding: 10px;
            color: white;
            text-align: left;
        }

        #media{
            background-color: gray;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th class="cabecalho" rowspan="2">Área</th>
                <th class="cabecalho" rowspan="2">Disciplinas</th>
                <th colspan="2" class="cabecalho">Notas</th>
                <th rowspan="2" class="cabecalho">Média</th>
            </tr>
            
            <tr>
                <th class="cabecalho">Nota 1</th>
                <th class="cabecalho">Nota 2</th>
            </tr>

        </thead>

        <tbody>
            <tr>
                <th rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
            </tr>

            <tr>
                <td>Física</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
            </tr>

            <tr>
                <td>Química</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
            </tr>

            <tr>
                <td>Biologia</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
            </tr>

            <tr>
                <th colspan="4" id="titulo">Média de Exatas</th>
                <td class="notas" id="media">0.0</td>
            </tr>

            <tr>
                <th rowspan="2">Humanas</th>
                <td>História</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
            </tr>

            <tr>
                <td>Geografia</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
                <td class="notas">0.0</td>
            </tr>

            <tr>
                <tr>
                <th colspan="4" id="titulo">Média de Humanas</th>
                <td class="notas" id="media">0.0</td>
            </tr>
            </tr>
        </tbody>
    </table>
</body>
</html>
